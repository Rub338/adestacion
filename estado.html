<!DOCTYPE html>

<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Estado de Equipos</title>

  <link rel="icon" type="image/png" href="images/favicon.png">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    :root {

      --bg: #eef2f7;

      --card-bg: #ffffff;

      --text: #1e293b;

      --text-muted: #64748b;

      --accent: #3b82f6;

      --ok: #10b981;

      --err: #ef4444;

      --warn: #f59e0b;

      --inactive: #6b7280;

      --border: #cbd5e1;

      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);

    }



    body.dark-mode {

      --bg: #0f0f1a;

      --card-bg: #1a1a2e;

      --text: #ffffff;

      --text-muted: #94a3b8;

      --accent: #4f8ef7;

      --border: rgba(255,255,255,0.08);

      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.4);

    }

    body.dark-mode .m-card          { background: #1e2a3a; border-color: #2d4a6e; }

    body.dark-mode .m-card.warn     { background: #2a2010; border-color: #78450a; }

    body.dark-mode .m-card.inactive { background: #1e1e1e; border-color: #3a3a3a; }

    body.dark-mode .m-card.down     { background: #2a1515; border-color: #7f1d1d; }

    body.dark-mode .badge-ok        { background: #052e16; color: #34d399; }

    body.dark-mode .badge-warn      { background: #2a1a00; color: #fbbf24; }

    body.dark-mode .badge-inactive  { background: #1f2937; color: #9ca3af; }

    body.dark-mode .badge-err       { background: #2a0a0a; color: #f87171; }

    body.dark-mode .m-details       { border-top-color: rgba(255,255,255,0.08); }

    body.dark-mode .sidebar-item    { background: #1a1a2e; border-color: rgba(255,255,255,0.08); }

    body.dark-mode .sidebar-item:hover { background: #1e2a3a; border-color: #4f8ef7; }



    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {

      font-family: 'Inter', sans-serif;

      background: var(--bg);

      color: var(--text);

      line-height: 1.5;

      padding-bottom: 40px;

      overflow-y: scroll;

    }

    body.no-transition, body.no-transition * { transition-duration: 0s !important; }



    /* ══ HEADER ═══════════════════════════════════════════ */

    header {

      background: var(--card-bg);

      border-bottom: 1px solid var(--border);

      padding: 16px 20px;

      position: sticky;

      top: 0;

      z-index: 100;

      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);

    }

    .header-top {

      display: flex;

      align-items: center;

      gap: 16px;

      max-width: 1200px;

      margin: 0 auto 12px;

    }

    .back-btn {

      display: flex;

      align-items: center;

      justify-content: center;

      width: 40px;

      height: 40px;

      border-radius: 10px;

      color: var(--text);

      text-decoration: none;

      transition: all 0.2s;

      background: var(--bg);

      border: 1px solid var(--border);

    }

    .back-btn:hover { color: var(--accent); border-color: var(--accent); }

    .header-actions {

      display: flex;

      align-items: center;

      gap: 16px;

      margin-left: auto;

    }

    .theme-toggle {

      padding: 7px 14px;

      font-size: 12px;

      border: 1px solid var(--border);

      border-radius: 8px;

      background: var(--card-bg);

      color: var(--text);

      cursor: pointer;

      transition: all 0.2s;

      font-family: inherit;

      white-space: nowrap;

    }

    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }



    .account-btn {

      position: relative;

      flex-shrink: 0;

    }

    .account-btn-trigger {

      display: flex;

      align-items: center;

      gap: 6px;

      padding: 7px 14px;

      background: var(--card-bg);

      color: var(--text);

      border: 1px solid var(--border);

      border-radius: 8px;

      font-size: 12px;

      font-weight: 600;

      cursor: pointer;

      transition: all 0.2s;

      font-family: inherit;

      white-space: nowrap;

    }

    .account-btn-trigger:hover { border-color: var(--accent); color: var(--accent); }

    .account-btn-trigger svg { width: 16px; height: 16px; }

    .account-dropdown {

      display: none;

      position: absolute;

      top: calc(100% + 8px);

      right: 0;

      background: var(--card-bg);

      border: 1px solid var(--border);

      border-radius: 12px;

      box-shadow: var(--shadow);

      min-width: 200px;

      overflow: hidden;

      z-index: 200;

    }

    .account-dropdown.open { display: block; }

    .account-dropdown-info {

      padding: 12px 16px;

      border-bottom: 1px solid var(--border);

    }

    .account-dropdown-name {

      font-size: 14px;

      font-weight: 700;

      color: var(--text);

      margin-bottom: 2px;

    }

    .account-dropdown-role {

      font-size: 12px;

      color: var(--accent);

      font-weight: 600;

      text-transform: uppercase;

      letter-spacing: 0.03em;

      margin-bottom: 2px;

    }

    .account-dropdown-email {

      font-size: 12px;

      color: var(--text-muted);

    }

    .account-dropdown-item {

      display: flex;

      align-items: center;

      gap: 10px;

      padding: 11px 16px;

      font-size: 13px;

      font-weight: 500;

      color: var(--text);

      cursor: pointer;

      transition: background 0.15s;

      border: none;

      background: none;

      width: 100%;

      text-align: left;

      font-family: inherit;

    }

    .account-dropdown-item:hover { background: var(--bg); }

    .account-dropdown-item.danger { color: var(--err); }

    .account-dropdown-item.danger:hover { background: rgba(239,68,68,0.08); }

    .account-dropdown-item svg { width: 15px; height: 15px; flex-shrink: 0; }



    .tv-btn {

      display: flex;

      align-items: center;

      gap: 8px;

      padding: 8px 16px;

      background: var(--bg);

      color: var(--text);

      text-decoration: none;

      border: 1px solid var(--border);

      border-radius: 10px;

      font-size: 13px;

      font-weight: 700;

      transition: all 0.2s;

    }

    .tv-btn:hover {

      border-color: var(--accent);

      color: var(--accent);

      transform: translateY(-1px);

    }

    .tv-btn svg { width: 18px; height: 18px; }



    .header-title h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; color: var(--text); }

    .header-title p { font-size: 13px; color: var(--text-muted); }



    /* Buscador */

    .search-container {

      max-width: 1200px;

      margin: 0 auto;

    }

    .search-container > div:first-child {

      position: relative;

    }

    .search-input {

      width: 100%;

      padding: 12px 16px 12px 44px;

      border-radius: 12px;

      border: 1px solid var(--border);

      background: var(--bg);

      font-size: 14px;

      outline: none;

      transition: all 0.2s;

      color: var(--text);

    }

    .search-input:focus {

      background: var(--card-bg);

      border-color: var(--accent);

    }

    .search-input::placeholder {

      color: var(--text-muted);

    }

    .search-icon {

      position: absolute;

      left: 14px;

      top: 50%;

      transform: translateY(-50%);

      color: var(--text-muted);

      width: 20px;

      height: 20px;

    }



    /* ══ CONTENIDO ════════════════════════════════════════ */

    main {

      max-width: 1400px;

      margin: 24px auto;

      padding: 0 20px;

    }

    .layout {

      display: flex;

      gap: 24px;

      align-items: flex-start;

    }

    .sidebar {

      width: 200px;

      flex-shrink: 0;

      position: sticky;

      top: 180px;

      align-self: flex-start;

      max-height: calc(100vh - 200px);

      overflow-y: auto;

      padding-right: 8px;

      z-index: 50;

    }

    .sidebar-item {

      padding: 12px 16px;

      border-radius: 10px;

      cursor: pointer;

      transition: background 0.15s, border-color 0.15s;

      margin-bottom: 4px;

      font-weight: 600;

      font-size: 14px;

      color: var(--text);

      background: var(--card-bg);

      border: 1px solid var(--border);

      box-shadow: var(--shadow);

      user-select: none;

      -webkit-tap-highlight-color: transparent;

      display: flex;

      align-items: center;

      justify-content: space-between;

    }

    .sidebar-item:hover {

      background: rgba(79, 142, 247, 0.05);

      border-color: var(--accent);

    }

    .sidebar-item.active {

      background: var(--accent);

      color: white;

      border-color: var(--accent);

    }

    .content {

      flex: 1;

      min-width: 0;

    }



    .sala-section { 

      margin-bottom: 40px; 

      background: var(--card-bg);

      border-radius: 16px;

      padding: 20px;

      border: 1px solid var(--border);

      box-shadow: var(--shadow);

    }

    .sala-header {

      display: flex;

      align-items: center;

      gap: 12px;

      margin-bottom: 20px;

      padding-bottom: 12px;

      border-bottom: 1px solid var(--border);

    }

    .sala-header h2 { 

      font-size: 18px; 

      font-weight: 700; 

      color: var(--text);

      margin: 0;

    }

    .sala-badge {

      font-size: 12px;

      font-weight: 600;

      background: var(--bg);

      color: var(--text-muted);

      padding: 4px 12px;

      border-radius: 12px;

      border: 1px solid var(--border);

    }

    .sala-badge-ratio {

      background: rgba(79, 142, 247, 0.1);

      color: var(--accent);

      padding: 4px 12px;

      border-radius: 12px;

      font-size: 12px;

      font-weight: 600;

      border: 1px solid rgba(79, 142, 247, 0.2);

    }



    .machine-grid {

      display: grid;

      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));

      gap: 16px;

    }



    /* ══ TARJETA (CARD) ═══════════════════════════════════ */

    .m-card {

      background: var(--card-bg);

      border: 1px solid var(--border);

      border-radius: 12px;

      cursor: default;

      padding: 20px;

      display: flex;

      flex-direction: column;

      gap: 12px;

      position: relative;

      box-shadow: var(--shadow);

    }

    .m-card.warn {

      background: var(--card-bg);

      border: 2px solid #f59e0b;

    }

    .m-card.inactive {

      background: var(--card-bg);

      border: 1px solid #6b7280;

      opacity: 0.85;

    }

    .m-card.down {

      background: var(--card-bg);

      border: 2px solid #ef4444;

    }

    .m-card.ok {

      background: var(--card-bg);

      border: 2px solid var(--ok);

    }

    .m-card.active-inc {

      background: var(--card-bg);

      border: 2px solid var(--ok);

      box-shadow: 0 0 0 1px var(--ok), 0 0 0 3px rgba(239, 68, 68, 0.3);

    }

    .m-card:hover {

      transform: translateY(-3px);

      box-shadow: 0 8px 16px -4px rgb(0 0 0 / 0.15), 0 4px 8px -2px rgb(0 0 0 / 0.1);

      transition: all 0.2s ease;

    }

    

    .m-top {

      display: flex;

      justify-content: space-between;

      align-items: flex-start;

      margin-bottom: 8px;

    }

    .m-status-dot {

      width: 10px;

      height: 10px;

      border-radius: 50%;

      margin-top: 6px;

      flex-shrink: 0;

    }

    .status-ok       { background: var(--ok); box-shadow: 0 0 8px var(--ok); }

    .status-warn     { background: var(--warn); box-shadow: 0 0 8px var(--warn); }

    .status-inactive { background: var(--inactive); box-shadow: 0 0 6px var(--inactive); }

    .status-err      { background: var(--err); box-shadow: 0 0 8px var(--err); }



    .m-info { 

      flex: 1; 

      padding: 0 10px;

      display: flex;

      flex-direction: column;

      gap: 4px;

    }

    .m-name { 

      font-weight: 700; 

      font-size: 16px; 

      margin-bottom: 2px;

      color: var(--text);

    }

    .m-type { 

      font-size: 12px; 

      color: var(--text-muted); 

      font-weight: 500;

      display: flex;

      align-items: center;

      gap: 8px;

      flex-wrap: wrap;

    }



    .m-badge {

      font-size: 11px;

      font-weight: 800;

      padding: 4px 8px;

      border-radius: 6px;

      text-transform: uppercase;

    }

    .badge-ok       { background: #ecfdf5; color: var(--ok); }

    .badge-warn      { background: #fffbeb; color: #b45309; }

    .badge-inactive  { background: #f3f4f6; color: #374151; }

    .badge-err       { background: #fef2f2; color: var(--err); }



    .m-details {

      padding-top: 12px;

      border-top: 1px solid var(--border);

      display: flex;

      flex-direction: column;

      gap: 8px;

    }

    .m-nota { 

      font-size: 12px; 

      color: var(--text-muted); 

      font-style: italic;

      line-height: 1.4;

    }

    .m-estado-sub {

      display: inline-block;

      font-size: 10px;

      font-weight: 700;

      text-transform: uppercase;

      color: var(--ok);

      background: #ecfdf5;

      border-radius: 4px;

      padding: 1px 5px;

      margin-left: 4px;

      vertical-align: middle;

    }



    .maquina-info {

      display: flex;

      justify-content: space-between;

      align-items: center;

      font-size: 11px;

      color: var(--text-muted);

      margin-top: 4px;

    }

    .maquina-info span:first-child {

      color: var(--accent);

      font-weight: 600;

    }



    /* Estado badges - igual que panel de administración */

    .estado-badge {

      font-size: 9px;

      font-weight: 700;

      text-transform: uppercase;

      padding: 1px 6px;

      border-radius: 4px;

      letter-spacing: 0.03em;

    }

    .estado-badge.ok {

      background: rgba(16, 185, 129, 0.1);

      color: var(--ok);

    }

    .estado-badge.gris {

      background: rgba(107, 114, 128, 0.1);

      color: var(--inactive);

    }

    .estado-badge.naranja {

      background: rgba(245, 158, 11, 0.1);

      color: var(--warn);

    }

    .estado-badge.rojo {

      background: rgba(239, 68, 68, 0.1);

      color: var(--err);

    }



    .empty-state {

      text-align: center;

      padding: 60px 20px;

      color: var(--text-muted);

    }



    #loader {

      display: flex;

      flex-direction: column;

      align-items: center;

      justify-content: center;

      padding: 100px 0;

      gap: 16px;

    }

    .spinner {

      width: 40px;

      height: 40px;

      border: 3px solid #e2e8f0;

      border-top-color: var(--accent);

      border-radius: 50%;

      animation: spin 0.8s linear infinite;

    }

    @keyframes spin { to { transform: rotate(360deg); } }



    /* Filtros */

    .filter-btn {

      padding: 8px 16px;

      border-radius: 8px;

      border: 2px solid var(--border);

      background: var(--card-bg);

      color: var(--text);

      font-size: 13px;

      font-weight: 600;

      cursor: pointer;

      transition: all 0.2s;

      white-space: nowrap;

    }

    .filter-btn:hover {

      border-color: var(--accent);

      background: rgba(79, 142, 247, 0.05);

    }

    .filter-btn.active {

      background: var(--accent);

      color: white;

      border-color: var(--accent);

    }

    .filter-btn[data-filter="activa"].active,

    .filter-btn[data-filter="all-equipo"].active {

      background: var(--ok);

      border-color: var(--ok);

    }

    .filter-btn[data-filter="inactiva"].active {

      background: var(--inactive, #6b7280);

      border-color: var(--inactive, #6b7280);

    }

    .filter-btn[data-filter="all-incidencia"].active,

    .filter-btn[data-filter="sin-incidencia"].active {

      background: var(--ok);

      border-color: var(--ok);

    }

    .filter-btn[data-filter="en seguimiento"].active {

      background: var(--warn);

      border-color: var(--warn);

    }

    .filter-btn[data-filter="sin resolver"].active {

      background: var(--err);

      border-color: var(--err);

    }



    @media (max-width: 600px) {

      .layout {

        flex-direction: column;

        gap: 16px;

      }

      .sidebar {

        position: static;

        width: 100%;

        max-height: none;

        padding-right: 0;

        display: flex;

        flex-wrap: wrap;

        gap: 8px;

      }

      .sidebar-item {

        flex: 1;

        min-width: 120px;

        text-align: center;

        margin-bottom: 0;

      }

      .machine-grid { grid-template-columns: 1fr; }

      .header-title h1 { font-size: 16px; }

    }

  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="js/supabase-config.js"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.css">

  <script src="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.js.iife.js"></script>

</head>

<body>

<script src="js/theme.js"></script>



<header>

  <div class="header-top">

    <a href="index.html" class="back-btn">

      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>

    </a>

    <div class="header-title">

      <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px; display: flex; align-items: center; gap: 6px;">

        <span>Inicio</span>

        <span style="opacity: 0.5;">/</span>

        <span style="color: var(--accent); font-weight: 500;">Estado de Equipos</span>

      </div>

      <h1>Estado de Equipos</h1>

      <p id="statsLabel">Cargando disponibilidad...</p>

    </div>

    <div class="header-actions">

      <button class="theme-toggle" onclick="iniciarTour()" title="Ver tutorial">📚 Tutorial</button>

      <a href="estado-tv.html" class="tv-btn" title="Modo Pantalla Completa (TV)">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>

        <span>Modo TV</span>

      </a>

      <button class="theme-toggle" id="btnThemeToggle" onclick="toggleTheme()">Tema oscuro</button>

      <div class="account-btn" id="accountBtn" style="display:none">

        <button class="account-btn-trigger" onclick="toggleAccountMenu()">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>

          Cuenta

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>

        </button>

        <div class="account-dropdown" id="accountDropdown">

          <div class="account-dropdown-info">

            <div class="account-dropdown-name" id="dropdownUserName">Usuario</div>

            <div class="account-dropdown-role" id="dropdownUserRole">Rol</div>

            <div class="account-dropdown-email" id="dropdownUserEmail">correo@ejemplo.com</div>

          </div>

          <button class="account-dropdown-item danger" onclick="cerrarSesion()">

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>

            Cerrar sesión

          </button>

        </div>

      </div>

    </div>

  </div>

  <div class="search-container" style="display:flex;flex-direction:column;gap:10px">

    <div style="position:relative">

      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>

      <input type="text" id="searchInput" class="search-input" oninput="filterMachines()" placeholder="Buscar equipos...">

    </div>

    <div style="display:flex;flex-direction:column;gap:6px">

      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">

        <span style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;width:72px;flex-shrink:0">Equipo</span>

        <button class="filter-btn active" data-group="equipo" data-filter="all-equipo" onclick="setFiltroEquipo('all')">Todos</button>

        <button class="filter-btn" data-group="equipo" data-filter="activa" onclick="setFiltroEquipo('activa')">Activas</button>

        <button class="filter-btn" data-group="equipo" data-filter="inactiva" onclick="setFiltroEquipo('inactiva')">Inactivas</button>

      </div>

      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">

        <span style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;width:72px;flex-shrink:0">Incidencia</span>

        <button class="filter-btn active" data-group="incidencia" data-filter="all-incidencia" onclick="setFiltroIncidencia('all')">Todas</button>

        <button class="filter-btn" data-group="incidencia" data-filter="sin-incidencia" onclick="setFiltroIncidencia('sin-incidencia')">Sin Incidencia</button>

        <button class="filter-btn" data-group="incidencia" data-filter="en seguimiento" onclick="setFiltroIncidencia('en seguimiento')">En Seguimiento</button>

        <button class="filter-btn" data-group="incidencia" data-filter="sin resolver" onclick="setFiltroIncidencia('sin resolver')">Sin Resolver</button>

      </div>

    </div>

  </div>

  <div id="filtroResumen" style="padding:8px 16px;font-size:12px;color:var(--text-muted);background:var(--bg-secondary);border-bottom:1px solid var(--border);display:none;max-width:1400px;margin:0 auto">

    <span id="filtroTexto"></span> • <span id="resultadoCount" style="font-weight:600;color:var(--text-primary)"></span> equipos

  </div>

</header>





<main id="mainContent">

  <div id="loader">

    <div class="spinner"></div>

    <p>Consultando base de datos...</p>

  </div>



  <div class="layout" id="layoutContainer" style="display:none">

    <aside class="sidebar" id="sidebarSalas"></aside>

    <div class="content" id="contentArea"></div>

  </div>

</main>



<script>

  let allData = {};

  let rawMachines = [];

  let scrollSpyEnabled = true;

  let loadStatusRetries = 0;

  const MAX_RETRIES = 5;



  // ── Estado unificado (local, independiente de admin.js) ──────────────────────

  // Estado operativo de la máquina (ACTIVA / INACTIVA)

  function estadoOperativo(m) {

    const inactiva = m.inactiva === true || (m.estado || '').toLowerCase().trim() === 'inactiva';

    if (inactiva) return {

      texto: 'INACTIVA', clase: 'status-inactive', color: '#6b7280',

      bg: 'rgba(107,114,128,0.1)', descripcion: 'Fuera de servicio'

    };

    return {

      texto: 'ACTIVA', clase: 'status-ok', color: 'var(--ok)',

      bg: 'rgba(16,185,129,0.1)', descripcion: 'Funcionando correctamente'

    };

  }



  // Estado de incidencia (SIN RESOLVER / EN SEGUIMIENTO / null si no hay)

  function estadoIncidencia(m) {

    if (!m.incidencia) return null;

    if (m.enSeguimiento) return {

      texto: 'EN SEGUIMIENTO', clase: 'status-warn', color: 'var(--warn)',

      bg: 'rgba(245,158,11,0.1)', card: 'm-card warn', descripcion: 'Incidencia en seguimiento'

    };

    return {

      texto: 'SIN RESOLVER', clase: 'status-err', color: 'var(--err)',

      bg: 'rgba(239,68,68,0.1)', card: 'm-card down', descripcion: 'Incidencia sin resolver'

    };

  }



  // Compatibilidad con código existente: devuelve el estado más relevante para color/dot

  function calcularEstadoUnificado(m) {

    const inc = estadoIncidencia(m);

    if (inc) return inc;

    return estadoOperativo(m);

  }



  // ── Función para asegurar que los elementos del DOM existan ─────────────────────

function asegurarElementosDOM() {

  const main = document.querySelector('main');

  if (!main) {

    console.error('No se encuentra el elemento main');

    return false;

  }



  // Verificar y crear elementos si no existen

  let layoutContainer = document.getElementById('layoutContainer');

  let sidebar = document.getElementById('sidebarSalas');

  let contentArea = document.getElementById('contentArea');



  if (!layoutContainer) {

    layoutContainer = document.createElement('div');

    layoutContainer.className = 'layout';

    layoutContainer.id = 'layoutContainer';

    layoutContainer.style.display = 'none';

    main.appendChild(layoutContainer);

    console.log('Creado layoutContainer dinámicamente');

  }



  if (!sidebar) {

    sidebar = document.createElement('aside');

    sidebar.className = 'sidebar';

    sidebar.id = 'sidebarSalas';

    layoutContainer.appendChild(sidebar);

    console.log('Creado sidebarSalas dinámicamente');

  }



  if (!contentArea) {

    contentArea = document.createElement('div');

    contentArea.className = 'content';

    contentArea.id = 'contentArea';

    layoutContainer.appendChild(contentArea);

    console.log('Creado contentArea dinámicamente');

  }



  return true;

}



  async function loadStatus() {

    try {

      // Asegurar que los elementos del DOM existan antes de continuar

      if (!asegurarElementosDOM()) {

        console.error('No se pueden crear los elementos del DOM');

        return;

      }

      

      const loader = document.getElementById('loader');

      const layoutContainer = document.getElementById('layoutContainer');

      const sidebar = document.getElementById('sidebarSalas');

      const contentArea = document.getElementById('contentArea');

      

      // Resetear contador de reintentos si los elementos se encuentran

      loadStatusRetries = 0;

      

      if (!window.supabaseClient) { setTimeout(loadStatus, 500); return; }

      const c = window.supabaseClient;



      // 1. Cargar máquinas

      const mRes = await c.from('equipos').select('id,nombre,tipo,modelo,estado,notas,salas(nombre)').order('nombre');



      // 2. Cargar incidencias abiertas (resuelta=false o null)

      const iResF = await c.from('registros').select('id,maquina_id,en_seguimiento').eq('tipo','Incidencia').eq('resuelta', false);

      const iResN = await c.from('registros').select('id,maquina_id,en_seguimiento').eq('tipo','Incidencia').is('resuelta', null);



      if (mRes.error) throw mRes.error;

      const incidencias = [...(iResF.data || []), ...(iResN.data || [])];

      const enRep = new Set(incidencias.map(i => i.maquina_id));

      

      // Mapa de maquina_id -> datos de incidencia (incluyendo en_seguimiento)

      const incidenciaPorMaquina = {};

      incidencias.forEach(inc => {

        incidenciaPorMaquina[inc.maquina_id] = inc;

      });

      

      let totOk = 0, totErr = 0;

      const bySala = {};

      rawMachines = [];



      (mRes.data||[]).forEach(m => {

        const sala = m.salas?.nombre || 'Sin sala';

        if (!bySala[sala]) bySala[sala] = [];



        const inactiva = (m.estado||'').toLowerCase().trim() === 'inactiva';

        const incidencia = enRep.has(m.id);

        const down = inactiva || incidencia;



        // Determinar estado de seguimiento

        const incData = incidenciaPorMaquina[m.id];

        const enSeguimiento = !!incData?.en_seguimiento;



        // Build status text: always show operational status + incident if applicable

        let statusParts = [m.estado || 'Activa'];

        if (incidencia) statusParts.push('Incidencia');

        const motivo = statusParts.join(' + ');



        const entry = {

          id: m.id,

          nombre: m.nombre || 'Sin nombre',

          sala,

          tipo: m.tipo || '',

          notas: m.notas || '',

          estado: m.estado || 'Activa',

          down,

          motivo,

          inactiva,

          incidencia,

          enSeguimiento,

        };



        bySala[sala].push(entry);

        rawMachines.push(entry);

        if (down) totErr++; else totOk++;

      });



      allData = bySala;

      document.getElementById('statsLabel').textContent = `${totOk} disponibles · ${totErr} fuera de servicio`;

      renderData(bySala);



    } catch(e) {

      console.error(e);

      document.getElementById('mainContent').innerHTML = `<div class="empty-state">⚠ Error al conectar con el servidor. Reintenta recargando la página.</div>`;

    }

  }



  function renderData(data) {

    const loader = document.getElementById('loader');

    const layoutContainer = document.getElementById('layoutContainer');

    const sidebar = document.getElementById('sidebarSalas');

    const contentArea = document.getElementById('contentArea');



    // Verificar que los elementos existen antes de continuar

    if (!loader || !layoutContainer || !sidebar || !contentArea) {

      console.error('Elementos del DOM no encontrados:', {

        loader: !!loader,

        layoutContainer: !!layoutContainer,

        sidebar: !!sidebar,

        contentArea: !!contentArea

      });

      return;

    }



    const sortedSalas = Object.keys(data).sort();



    if (sortedSalas.length === 0) {

      loader.style.display = 'none';

      layoutContainer.style.display = 'flex';

      

      // Mostrar mensaje de no resultados pero mantener la estructura

      sidebar.innerHTML = '<div class="sidebar-item" style="opacity:0.5">Sin resultados</div>';

      contentArea.innerHTML = `

        <div style="padding:40px;text-align:center;color:var(--text-muted)">

          <h3>No se encontraron equipos</h3>

          <p>Intenta con otro filtro o busca por nombre</p>

        </div>

      `;

      

      return;

    }



    loader.style.display = 'none';

    layoutContainer.style.display = 'flex';



    // Render sidebar

    sidebar.innerHTML = sortedSalas.map(sala => {

      const count = data[sala].length;

      return `

        <div class="sidebar-item" data-sala="${sala.toLowerCase()}" onclick="scrollToSala('${sala.toLowerCase()}')">

          ${sala} <span style="font-size:12px;opacity:0.6;margin-left:auto">${count}</span>

        </div>

      `;

    }).join('');



    // Render content

    contentArea.innerHTML = sortedSalas.map(sala => {

      const machines = data[sala];

      return `

        <section class="sala-section" data-sala="${sala.toLowerCase()}" id="sala-${sala.toLowerCase()}">

          <div class="sala-header">

            <h2>${sala}</h2>

            <span class="sala-badge">${machines.length} equipos</span>

            <span class="sala-badge-ratio">${machines.filter(m => !m.down).length}/${machines.length} disponibles</span>

          </div>

          <div class="machine-grid">

            ${machines.map(m => machineHTML(m)).join('')}

          </div>

        </section>

      `;

    }).join('');



    // Setup scroll spy

    setupScrollSpy();

  }



  let _filtroEquipo = 'all';

  let _filtroIncidencia = 'all';



  function setFiltroEquipo(val) {

    _filtroEquipo = val;

    document.querySelectorAll('.filter-btn[data-group="equipo"]').forEach(btn => {

      btn.classList.toggle('active', btn.dataset.filter === (val === 'all' ? 'all-equipo' : val));

    });

    applyFilters();

  }



  function setFiltroIncidencia(val) {

    _filtroIncidencia = val;

    document.querySelectorAll('.filter-btn[data-group="incidencia"]').forEach(btn => {

      btn.classList.toggle('active', btn.dataset.filter === (val === 'all' ? 'all-incidencia' : val));

    });

    applyFilters();

  }



  function applyFilters() {

    const filteredData = {};

    let totalVisible = 0;

    const query = document.getElementById('searchInput')?.value.toLowerCase().trim() || '';



    Object.keys(allData).forEach(sala => {

      const machines = allData[sala].filter(m => {

        const tieneIncidencia = m.incidencia === true;

        const enSeg = m.enSeguimiento === true;

        // Filtro equipo

        if (_filtroEquipo === 'activa'   && m.inactiva === true) return false;

        if (_filtroEquipo === 'inactiva' && m.inactiva !== true) return false;

        // Filtro incidencia

        if (_filtroIncidencia === 'sin-incidencia'  && tieneIncidencia) return false;

        if (_filtroIncidencia === 'en seguimiento'  && !(tieneIncidencia && enSeg)) return false;

        if (_filtroIncidencia === 'sin resolver'    && !(tieneIncidencia && !enSeg)) return false;

        // Filtro texto

        if (query) {

          return m.nombre.toLowerCase().includes(query) ||

            m.tipo.toLowerCase().includes(query) ||

            m.sala.toLowerCase().includes(query) ||

            (m.notas && m.notas.toLowerCase().includes(query));

        }

        return true;

      });

      if (machines.length > 0) {

        filteredData[sala] = machines;

        totalVisible += machines.length;

      }

    });



    // Mostrar resumen del filtro

    const filtroResumen = document.getElementById('filtroResumen');

    const filtroTexto = document.getElementById('filtroTexto');

    const resultadoCount = document.getElementById('resultadoCount');

    const hayFiltro = _filtroEquipo !== 'all' || _filtroIncidencia !== 'all';



    if (hayFiltro) {

      filtroResumen.style.display = 'block';

      const partes = [];

      if (_filtroEquipo !== 'all') partes.push(_filtroEquipo.charAt(0).toUpperCase() + _filtroEquipo.slice(1));

      if (_filtroIncidencia !== 'all') partes.push(_filtroIncidencia.charAt(0).toUpperCase() + _filtroIncidencia.slice(1).replace('-', ' '));

      filtroTexto.textContent = `Filtro: ${partes.join(' + ')}`;

      resultadoCount.textContent = totalVisible;

    } else {

      filtroResumen.style.display = 'none';

    }



    renderData(filteredData);

  }



  function filterMachines() {

    applyFilters();

  }





  function scrollToSala(salaName) {

    // Disable scroll spy during manual click

    scrollSpyEnabled = false;



    // Set active class immediately for visual feedback

    const sidebarItems = document.querySelectorAll('.sidebar-item');

    sidebarItems.forEach(item => {

      item.classList.toggle('active', item.dataset.sala === salaName);

    });



    const section = document.getElementById(`sala-${salaName}`);

    if (section) {

      const currentScroll = window.pageYOffset;

      const sectionTop = section.getBoundingClientRect().top + currentScroll;

      const headerHeight = document.querySelector('header')?.offsetHeight || 180;

      let y;

      if (sectionTop <= currentScroll + headerHeight) {

        y = 0;

      } else {

        y = sectionTop - headerHeight - 16;

        if (y < 0) y = 0;

      }

      window.scrollTo({ top: y, behavior: 'smooth' });



      // Re-enable scroll spy after scroll completes

      setTimeout(() => {

        scrollSpyEnabled = true;

      }, 800);

    } else {

      scrollSpyEnabled = true;

    }

  }



  // Scroll spy para resaltar sala activa

  function setupScrollSpy() {

    const sections = document.querySelectorAll('.sala-section');

    const sidebarItems = document.querySelectorAll('.sidebar-item');



    const observer = new IntersectionObserver((entries) => {

      entries.forEach(entry => {

        if (entry.isIntersecting && scrollSpyEnabled) {

          const salaName = entry.target.dataset.sala;

          sidebarItems.forEach(item => {

            item.classList.toggle('active', item.dataset.sala === salaName);

          });

        }

      });

    }, { threshold: 0.3, rootMargin: '-100px 0px -70% 0px' });



    sections.forEach(section => observer.observe(section));

  }



  function machineHTML(m) {

    const opState = estadoOperativo(m);

    const incState = estadoIncidencia(m);

    // El dot y borde de la tarjeta reflejan la incidencia si existe, si no el estado operativo

    const mainState = incState || opState;

    

    // Si la máquina está activa pero tiene incidencia sin resolver, usar borde verde

    let cardClass;

    if (incState && opState.texto === 'ACTIVA') {

      cardClass = 'm-card active-inc';

    } else if (incState) {

      cardClass = incState.card || 'm-card down';

    } else {

      cardClass = opState.texto === 'INACTIVA' ? 'm-card inactive' : 'm-card ok';

    }



    const opBadgeClase = opState.texto === 'ACTIVA' ? 'ok' : 'gris';

    const opBadgeHTML = `<span class="estado-badge ${opBadgeClase}" style="font-size:9px;padding:1px 6px;background:${opState.bg};color:${opState.color};border:1px solid ${opState.color}20;">${opState.texto}</span>`;



    let incBadgeHTML = '';

    if (incState) {

      const incClase = incState.texto === 'EN SEGUIMIENTO' ? 'naranja' : 'rojo';

      incBadgeHTML = `<span class="m-badge estado-badge ${incClase}" style="align-self:flex-start;background:${incState.bg};color:${incState.color};border:1px solid ${incState.color}20;">${incState.texto}</span>`;

    }



    return `

      <div class="${cardClass}" data-nombre="${m.nombre.toLowerCase()}" data-tipo="${(m.tipo||'').toLowerCase()}" title="${mainState.descripcion}">

        <div class="m-top">

          <div class="m-status-dot ${mainState.clase}"></div>

          <div class="m-info">

            <div class="m-name">${esc(m.nombre)}</div>

            <div class="m-type" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">

              <span>${esc(m.tipo)}</span>

              ${opBadgeHTML}

            </div>

          </div>

        </div>

        <div class="maquina-info">

          <span style="color: var(--accent); font-weight: 600">${m.sala}</span>

          ${m.notas ? `<span>${esc(m.notas)}</span>` : ''}

        </div>

        ${incBadgeHTML ? `<div class="m-details">${incBadgeHTML}</div>` : ''}

      </div>

    `;

  }



  function normalize(s) { return s.toLowerCase().replace(/[\s\-_.]/g, ''); }

  function fuzzyMatch(q, text) {

    const pattern = q.split('').map(c => c.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('.*');

    return new RegExp(pattern, 'i').test(text);

  }

  function getCardState(card) {

    if (card.classList.contains('inactive') || card.classList.contains('down')) return 'inactiva';

    return 'activa';

  }



  function filterMachines() {

    applyFilters();

  }



  function esc(s) {

    const d = document.createElement('div'); d.textContent = String(s||''); return d.innerHTML;

  }



  function toggleAccountMenu() {

    document.getElementById('accountDropdown').classList.toggle('open');

  }



  document.addEventListener('click', function(e) {

    const btn = document.getElementById('accountBtn');

    if (btn && !btn.contains(e.target)) {

      document.getElementById('accountDropdown').classList.remove('open');

    }

  });



  function updateUserPanel() {

    try {

      const sessionStr = localStorage.getItem('sgi_user_session');

      const adminSessionStr = localStorage.getItem('sgi_admin_session');



      if (adminSessionStr) {

        const adminSession = JSON.parse(adminSessionStr);

        const nombre = adminSession.username || adminSession.nombre || 'Administrador';

        const email = adminSession.email || '';

        const roleLabelsAdmin = { superadmin: 'Administrador', admin: 'Administrador', tecnico: 'Técnico' };

        const rolText = roleLabelsAdmin[adminSession.type] || 'Administrador';

        document.getElementById('dropdownUserName').textContent = nombre;

        document.getElementById('dropdownUserRole').textContent = rolText;

        document.getElementById('dropdownUserEmail').textContent = email;

        document.getElementById('accountBtn').style.display = 'block';

        return;

      }



      if (!sessionStr) {

        document.getElementById('accountBtn').style.display = 'none';

        return;

      }



      const session = JSON.parse(sessionStr);

      const rol = session.rol || 'usuario';

      const nombre = session.nombre || session.email || 'Usuario';

      const email = session.email || '';

      const roleLabels = { 'usuario': 'Usuario', 'tecnico': 'Técnico', 'admin': 'Administrador' };

      const rolText = roleLabels[rol] || rol;

      document.getElementById('dropdownUserName').textContent = nombre;

      document.getElementById('dropdownUserRole').textContent = rolText;

      document.getElementById('dropdownUserEmail').textContent = email;

      document.getElementById('accountBtn').style.display = 'block';

    } catch (err) {

      console.error('Error updating user panel:', err);

    }

  }



  function cerrarSesion() {

    const pendingMaquinaId = localStorage.getItem('sgi_pending_maquinaId');

    localStorage.removeItem('sgi_user_session');

    localStorage.removeItem('sgi_admin_session');

    if (pendingMaquinaId) {

      localStorage.setItem('sgi_pending_maquinaId', pendingMaquinaId);

    }

    window.location.href = 'index.html';

  }

  document.addEventListener('DOMContentLoaded', () => {
    // Pequeño retraso para asegurar que todos los elementos del DOM estén disponibles

    setTimeout(() => {

      loadStatus();

      updateUserPanel();

    }, 100);

  });



  // ── Tutorial ─────────────────────────────────────────────────────────────────

  function iniciarTour() {

    const driverInstance = window.driver?.js?.driver || window.driver;

    if (!driverInstance) return;



    const driverObj = driverInstance({

      showProgress: true,

      animate: true,

      steps: [

        {

          popover: {

            title: 'Bienvenido',

            description: 'Recorrido rápido por la vista de estado de equipos.'

          }

        },

        {

          element: '#searchInput',

          popover: {

            title: 'Buscador',

            description: 'Escribe aquí para buscar equipos por nombre, tipo o sala.'

          }

        },

        {

          element: '.filter-btn[data-group="equipo"]',

          popover: {

            title: 'Filtros de Equipo',

            description: 'Filtra equipos por estado: Todos, Activas o Inactivas.'

          }

        },

        {

          element: '.filter-btn[data-group="incidencia"]',

          popover: {

            title: 'Filtros de Incidencia',

            description: 'Filtra por estado de incidencia: Todas, Sin Incidencia, En Seguimiento o Sin Resolver.'

          }

        },

        {

          element: '#sidebarSalas',

          popover: {

            title: 'Navegación por Salas',

            description: 'Haz clic en una sala para saltar directamente a esa sección.'

          }

        },

        {

          element: '.m-card',

          popover: {

            title: 'Tarjeta de Equipo',

            description: 'Cada tarjeta muestra el estado, tipo y detalles del equipo. Los colores indican el estado: verde (ok), amarillo (en seguimiento), rojo (sin resolver), gris (inactiva).'

          }

        },

        {

          element: '.tv-btn',

          popover: {

            title: 'Modo TV',

            description: 'Accede a la vista optimizada para pantallas grandes (TV).'

          }

        },

        {

          element: '#btnThemeToggle',

          popover: {

            title: 'Tema',

            description: 'Cambia entre modo claro y oscuro.'

          }

        }

      ]

    });

    driverObj.drive();

  }

</script>
